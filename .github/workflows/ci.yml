name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      docker-compose: ${{ steps.filter.outputs.docker-compose }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed file types
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker-compose:
              - "docker-compose.yml"
              - "Dockerfile"
              - ".dockerignore"
              - "docker/**/*.json"
              - "migrations/**/*.sql"
            markdown:
              - "**/*.md"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run Python and Docker pre-commit hooks
        run: |
          uv run pre-commit run ruff-lint --all-files
          uv run pre-commit run ruff-format --all-files
          uv run pre-commit run ty --all-files

  docker-compose:
    name: Docker Compose lint
    needs:
      - changes
    if: needs.changes.outputs.docker-compose == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run Docker Compose lint
        run: uv run pre-commit run docker-compose-config --all-files

  markdown:
    name: Markdown lint
    needs:
      - changes
    if: needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run Markdown lint
        run: uv run pre-commit run pymarkdown --all-files

  unit-test:
    name: Unit test
    needs:
      - lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run unit tests
        run: uv run pytest tests/unit -x --cov=src --cov-report=xml
        env:
          # Override settings for CI test environment
          BCRYPT_ROUNDS: "4"
          EMAIL_SERVICE_MAX_RETRIES: "1"
          EMAIL_SERVICE_RETRY_MAX_WAIT: "0.0"
          MAX_RESEND_ATTEMPTS: "2"
          RESEND_COOLDOWN_SECONDS: "0"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  integration-test:
    name: Integration test
    needs:
      - lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run integration tests
        run: uv run pytest tests/integration -x
        env:
          # Override settings for CI test environment
          BCRYPT_ROUNDS: "4"
          EMAIL_SERVICE_MAX_RETRIES: "1"
          EMAIL_SERVICE_RETRY_MAX_WAIT: "0.0"
          MAX_RESEND_ATTEMPTS: "2"
          RESEND_COOLDOWN_SECONDS: "0"

  docker:
    name: Docker build and E2E
    if: always() && needs.lint.result == 'success' && needs.unit-test.result == 'success' && needs.integration-test.result == 'success' && !contains(fromJSON('["failure", "cancelled"]'), needs.docker-compose.result)
    needs:
      - lint
      - unit-test
      - integration-test
      - docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: registration-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test runtime command
        run: docker run --rm registration-api:ci uvicorn --version

      - name: Run Docker Compose E2E checks
        run: uv run python scripts/ci/docker_compose_e2e.py
