repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: ruff check --fix
        language: system
        types: [python]
        require_serial: false

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        require_serial: false

      - id: ty
        name: ty type check
        entry: ty check src/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: docker-compose-config
        name: docker compose config
        entry: bash -c 'docker compose config >/dev/null || docker-compose config >/dev/null'
        language: system
        pass_filenames: false
        files: ^(docker-compose\.yml|Dockerfile|\.dockerignore|migrations/.*\.sql)$
        require_serial: true

      - id: pymarkdown
        name: pymarkdown
        entry: pymarkdown --config .pymarkdown.json scan
        language: system
        types: [markdown]
        require_serial: false
