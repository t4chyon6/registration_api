repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: ruff check --fix
        language: system
        types: [python]
        require_serial: false

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        require_serial: false

      - id: ty
        name: ty type check
        entry: ty check src/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
