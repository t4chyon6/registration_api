services:
  postgres:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: registration_api
      POSTGRES_USER: registration_api
      POSTGRES_PASSWORD: registration_api
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registration_api -d registration_api"]
      interval: 2s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  email-service:
    image: mockserver/mockserver:latest
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/activation-codes.json
      MOCKSERVER_LOG_LEVEL: INFO
    ports:
      - "1080:1080"
    volumes:
      - ./docker/mockserver/activation-codes.json:/config/activation-codes.json:ro

  app:
    image: registration-api:ci
    build:
      context: .
      dockerfile: docker/Dockerfile
    profiles:
      - app
    depends_on:
      postgres:
        condition: service_healthy
      email-service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://registration_api:registration_api@postgres:5432/registration_api
      EMAIL_SERVICE_URL: http://email-service:1080
      ARGON2_MEMORY_COST: ${ARGON2_MEMORY_COST:-65536}
      ARGON2_TIME_COST: ${ARGON2_TIME_COST:-3}
      ARGON2_PARALLELISM: ${ARGON2_PARALLELISM:-4}
      ARGON2_HASH_LEN: ${ARGON2_HASH_LEN:-32}
      ARGON2_SALT_LEN: ${ARGON2_SALT_LEN:-16}
      EMAIL_SERVICE_MAX_RETRIES: ${EMAIL_SERVICE_MAX_RETRIES:-3}
      EMAIL_SERVICE_RETRY_MAX_WAIT: ${EMAIL_SERVICE_RETRY_MAX_WAIT:-10.0}
      MAX_RESEND_ATTEMPTS: ${MAX_RESEND_ATTEMPTS:-5}
      RESEND_COOLDOWN_SECONDS: ${RESEND_COOLDOWN_SECONDS:-60}
      LOG_LEVEL: info
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json', timeout=2).read()",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "8000:8000"

volumes:
  postgres-data:
